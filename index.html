<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cig-gy</title>
    <style>
        :root {
            --bg-primary: #220972;
            --bg-secondary: #2f0763;
            --showcase-primary: rgb(177, 50, 0);
            --showcase-secondary: #f0b800;
            --main-text: #ffd640;
        }

        * {
            color: var(--main-text);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1, h2 {
            margin-bottom: 20px;
        }

        .showcase {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            grid-gap: 20px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid var(--bg-secondary);
        }

        .card {
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--showcase-secondary);
            background-color: var(--showcase-primary);
        }

        .card a {
            color: var(--main-text);
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .card .descript {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 10px;
            min-height: 10vh;
            color: var(--main-text);
        }

        .card .descript a {
            color: var(--main-text);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>Crazy Innocent Games</h2>
    <div>
        <h1>Apps and Games</h1>
        <div class="showcase">
            <div class="card">
                <a href="https://lides.itch.io" target="_blank">itch.io
                <div class="descript">
                    
                    <a href="https://x.com/crazy_inocent" target="_blank">twitter</a>
                </div>
                
                </a>
            </div>
            
            <div class="card">
                <a href="#" target="_blank">Carta Parrilla</a>
                <div class="descript">
                    Truco And more
                    
                    <a href="./policies/carta-parrilla-private-policy.html" target="_blank">Policy</a>
                </div>
            </div>
            <div class="card">
                <a href="#" target="_blank">Pocket Crab Atk</a>
                <div class="descript">
                    Coming soon: be the first to know
                    <a href="./policies/pocket-crab-atk-policy.html" target="_blank">Policy</a>
                </div>
            </div>
            </div>
        </div>
        
        <div class="showcase">

            <div class="card">
                <a href="#" target="_blank">Lemon Dragon <b>Pocket</b></a>
                <div class="descript">
                    Coming soon: be the first to know
                    <a href="./policies/lemon-dragon-pocket-policy.html" target="_blank">Policy</a>
                </div>
            </div>
            <div class="card">
                <a href="#" target="_blank">Blocktron</a>
                <div class="descript">
                    Puzzle game
                    <a href="./policies/blocktron-policy.html" target="_blank">Policy</a>
                </div>
            </div>
            
            <div class="card">
                
            </div>
        </div>

    </div>
</body>
</html>
